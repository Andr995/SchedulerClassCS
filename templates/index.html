<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orario Lezioni - Visualizzazione Pubblica</title>
  <style>
    :root {
      --bg: #f3f5f2;
      --panel: #ffffff;
      --ink: #1d2b1f;
      --muted: #4f5f53;
      --line: #d7ded8;
      --accent: #245f3f;
      --good: #1d7f45;
      --bad: #b03838;
      --shadow: 0 10px 30px rgba(0, 0, 0, .08);
      --sans: "Source Sans 3", "Noto Sans", "Segoe UI", sans-serif;
      --serif: "Literata", "Georgia", serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(900px 400px at 20% -10%, rgba(36,95,63,.16), transparent 60%),
        radial-gradient(800px 500px at 100% 0%, rgba(120,150,90,.12), transparent 62%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
    .hero {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(140deg, #f8faf6, #eef4ed);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 14px;
    }
    h1 {
      font-family: var(--serif);
      margin: 0;
      font-size: 30px;
      letter-spacing: .2px;
    }
    .sub { margin-top: 6px; color: var(--muted); }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      font-size: 14px;
      padding: 8px 12px;
      cursor: pointer;
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .panel .hd {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      background: #f7faf7;
    }
    .panel .bd { padding: 12px 14px; }
    .meta-line { color: var(--muted); font-size: 14px; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border-bottom: 1px solid #ecf0ec;
      padding: 8px;
      text-align: left;
      font-size: 13px;
      vertical-align: top;
    }
    th { background: #f8faf8; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; font-size: 12px; }
    .ok { color: var(--good); font-weight: 700; }
    .ko { color: var(--bad); font-weight: 700; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fafdfa;
    }
    .kpi .v { font-size: 22px; font-weight: 700; }
    .kpi .l { color: var(--muted); font-size: 12px; }
    .muted { color: var(--muted); }
    .empty { padding: 10px; border: 1px dashed var(--line); border-radius: 10px; color: var(--muted); }
    .cw-wrap { margin-bottom: 14px; border: 2px solid #202020; border-radius: 8px; overflow: hidden; background: #fff; }
    .cw-title {
      text-align: center;
      font-weight: 700;
      font-size: 24px;
      padding: 8px;
      background: #ececec;
      border-bottom: 1px solid #202020;
      font-family: var(--serif);
    }
    .cw-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .cw-table th, .cw-table td {
      border: 1px solid #202020;
      text-align: center;
      vertical-align: middle;
      padding: 6px 4px;
      font-size: 12px;
    }
    .cw-table thead th { background: #c8d3c0; font-weight: 700; }
    .cw-hour { width: 56px; font-weight: 700; background: #dfe5da; }
    .cw-day { background: #efefef; }
    .cw-event {
      background: #c8d3df;
      font-size: 12px;
      line-height: 1.3;
      font-weight: 600;
    }
    .cw-event .meta { font-size: 11px; font-weight: 500; color: #253242; }

    @media print {
      .hero .toolbar { display: none !important; }
      body { background: #fff; }
      .panel { break-inside: avoid; box-shadow: none; }
      .cw-wrap { break-inside: avoid-page; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Orario Lezioni</h1>
      <div class="sub">Visualizzazione pubblica: area senza modifica dati, solo consultazione.</div>
      <div class="toolbar">
        <button class="primary" id="btnRefresh">Aggiorna</button>
        <button id="btnPrint">Stampa pagina</button>
        <a href="/admin" style="text-decoration:none"><button type="button">Area Amministrativa</button></a>
      </div>
    </section>

    <section class="panel">
      <div class="hd">Stato Generazione</div>
      <div class="bd" id="scheduleStatus"></div>
    </section>

    <section class="panel">
      <div class="hd">Algoritmo E Vincoli</div>
      <div class="bd" id="constraintLog"></div>
    </section>

    <section class="panel">
      <div class="hd">Tabelle Per Curriculum</div>
      <div class="bd" id="curriculumTables"></div>
    </section>
  </div>

<script>
let payload = null;

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function dayOrder(day) {
  const map = {Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5};
  return map[day] || 99;
}

async function loadPublicTimetable() {
  const r = await fetch('/api/public/timetable');
  if (!r.ok) throw new Error('Errore caricamento orario pubblico');
  payload = await r.json();
  renderStatus();
  renderConstraintLog();
  renderCurriculumTables();
}

function renderStatus() {
  const el = document.getElementById('scheduleStatus');
  const s = payload?.schedule || {};
  if (s.status === 'none') {
    el.innerHTML = `<div class="empty">${esc(s.message || 'Nessun orario disponibile.')}</div>`;
    return;
  }

  const assignments = (s.assignments || []).filter(a => a.day !== 'N/A');
  const totalHours = assignments.reduce((acc, a) => acc + (Number(a.duration) || 0), 0);
  const semText = s.semester ? `${s.semester} semestre` : 'tutti i semestri';
  const algorithm = s.algorithmLabel || s.solverBackend || payload?.algorithm?.available || 'N/D';

  el.innerHTML = `
    <div class="meta-line">Ultimo aggiornamento: <b>${esc(s.timestamp || 'N/D')}</b></div>
    <div class="meta-line">Status: <b>${esc(s.status || 'N/D')}</b> | Algoritmo: <b>${esc(algorithm)}</b> | Semestre: <b>${esc(semText)}</b></div>
    <div class="grid" style="margin-top:10px">
      <div class="kpi"><div class="v">${assignments.length}</div><div class="l">Lezioni piazzate</div></div>
      <div class="kpi"><div class="v">${totalHours}h</div><div class="l">Ore settimanali</div></div>
      <div class="kpi"><div class="v">${esc(s.solveTimeSeconds || 0)}s</div><div class="l">Tempo solver</div></div>
      <div class="kpi"><div class="v">${esc(s.objective ?? 'N/D')}</div><div class="l">Penalita totale</div></div>
    </div>
  `;
}

function renderConstraintLog() {
  const el = document.getElementById('constraintLog');
  const report = payload?.schedule?.hardConstraintReport;
  if (!report || !Array.isArray(report.checks) || report.checks.length === 0) {
    el.innerHTML = '<div class="empty">Log vincoli non disponibile per questo orario.</div>';
    return;
  }

  const rows = report.checks
    .map(c => `<tr>
      <td>${esc(c.label || c.id)}</td>
      <td class="${c.respected ? 'ok' : 'ko'}">${c.respected ? 'Rispettato' : 'Violato'}</td>
      <td>${esc(c.violations || 0)}</td>
    </tr>`)
    .join('');

  el.innerHTML = `
    <div style="margin-bottom:8px">
      <span class="pill">Vincoli rispettati: ${esc(report.respectedCount || 0)}/${esc(report.totalChecks || 0)}</span>
      <span class="pill" style="margin-left:6px">Eventi piazzati: ${esc(report.placedEvents || 0)}</span>
    </div>
    <table>
      <thead><tr><th>Vincolo</th><th>Esito</th><th>Violazioni</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderCurriculumTables() {
  const container = document.getElementById('curriculumTables');
  const tables = payload?.curriculumTables || [];
  const tm = payload?.meta?.timeModel || {};
  const ds = Number(tm.dayStart || 8);
  const de = Number(tm.dayEnd || 19);
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

  if (tables.length === 0) {
    container.innerHTML = '<div class="empty">Nessun curriculum disponibile.</div>';
    return;
  }

  container.innerHTML = tables.map(block => {
    const titleParts = [];
    if (block.programName || block.programId) titleParts.push(`CdL ${block.programName || block.programId}`);
    titleParts.push(block.curriculumName || 'Curriculum');
    if (block.yearCohort) titleParts.push(block.yearCohort);
    const fullTitle = titleParts.join(' - ');

    const rows = [...(block.rows || [])]
      .sort((a, b) => {
        const dd = dayOrder(a.day) - dayOrder(b.day);
        if (dd !== 0) return dd;
        return (a.startHour || 0) - (b.startHour || 0);
      });

    const startMap = {};
    const coverMap = {};
    for (const r of rows) {
      const day = r.day;
      if (!days.includes(day)) continue;
      const start = Number(r.startHour);
      const end = Number(r.endHour);
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) continue;
      startMap[`${day}_${start}`] = r;
      for (let h = start; h < end; h++) {
        coverMap[`${day}_${h}`] = true;
      }
    }

    let body = '';
    for (let h = ds; h < de; h++) {
      body += `<tr><td class="cw-hour">${String(h).padStart(2, '0')}:00</td><td class="cw-hour">${String(h + 1).padStart(2, '0')}:00</td>`;
      for (const d of days) {
        const key = `${d}_${h}`;
        const ev = startMap[key];
        if (ev) {
          const teacherList = (ev.teacherNames || ev.teacherIds || []);
          const primaryTeacher = Array.isArray(teacherList) && teacherList.length ? teacherList[0] : '';
          const roomLabel = ev.roomName || ev.roomId || '';
          const program = ev.programName || ev.programId || '';
          const dur = Math.max(1, Number(ev.duration) || (Number(ev.endHour) - Number(ev.startHour)) || 1);
          body += `<td class="cw-event" rowspan="${dur}">
            <div>${esc(ev.courseName || '')}</div>
            ${program ? `<div class="meta">CdL: ${esc(program)}</div>` : ''}
            ${roomLabel ? `<div class="meta">Aula: ${esc(roomLabel)}</div>` : ''}
            ${primaryTeacher ? `<div class="meta">Docente: ${esc(primaryTeacher)}</div>` : ''}
          </td>`;
        } else if (coverMap[key]) {
          // Coperta da un evento con rowspan iniziato in una riga precedente.
        } else {
          body += '<td class="cw-day"></td>';
        }
      }
      body += '</tr>';
    }

    return `
      <div class="cw-wrap">
        <div class="cw-title">${esc(fullTitle)}</div>
        <div style="overflow:auto">
          <table class="cw-table">
            <thead>
              <tr>
                <th class="cw-hour">dalle</th>
                <th class="cw-hour">alle</th>
                <th>lunedi</th>
                <th>martedi</th>
                <th>mercoledi</th>
                <th>giovedi</th>
                <th>venerdi</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      </div>
    `;
  }).join('');
}

document.getElementById('btnRefresh').onclick = () => loadPublicTimetable().catch(e => alert(e.message));
document.getElementById('btnPrint').onclick = () => window.print();

loadPublicTimetable().catch(err => {
  console.error(err);
  document.getElementById('scheduleStatus').innerHTML = '<div class="empty">Errore nel caricamento dati pubblici.</div>';
});
</script>
</body>
</html>
