<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login Amministratore</title>
  <style>
    :root {
      --bg: #101820;
      --panel: #1a2733;
      --text: #f0f4f8;
      --muted: #b0bfcc;
      --line: #2f4658;
      --accent: #4ea86b;
      --danger: #ff6b6b;
      --sans: "Source Sans 3", "Noto Sans", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: var(--sans);
      background:
        radial-gradient(900px 420px at 10% 0%, rgba(78,168,107,.16), transparent 60%),
        radial-gradient(700px 300px at 90% 10%, rgba(100,150,210,.16), transparent 58%),
        var(--bg);
      padding: 20px;
    }
    .card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 18px;
      box-shadow: 0 14px 32px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 8px 0; font-size: 25px; }
    .muted { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 13px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #12202a;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      border: 1px solid var(--accent);
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      padding: 10px;
      cursor: pointer;
    }
    .error {
      border: 1px solid rgba(255,107,107,.5);
      color: #ffd4d4;
      background: rgba(255,107,107,.14);
      border-radius: 10px;
      padding: 8px;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .links { margin-top: 10px; font-size: 13px; color: var(--muted); }
    .links a { color: #9fd5ff; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/login">
    <h1>Accesso Amministratore</h1>
    <div class="muted">Inserisci la password per accedere alle funzioni di modifica e generazione orario.</div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autofocus />
    <button type="submit">Accedi</button>
    <div class="links">Vista pubblica senza login: <a href="/">apri orario</a></div>
  </form>
</body>
</html>
